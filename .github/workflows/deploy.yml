name: Deploy Frontend

on:
  push:
    branches: [main, master]
  schedule:
    # Daily at 09:00 UTC (~1-2am Pacific) to pick up new Meetup events.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Gatsby site
        run: npm run build
        env:
          STRAPI_URL: ${{ vars.STRAPI_URL }}
          GATSBY_STRAPI_URL: ${{ vars.GATSBY_STRAPI_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 and invalidate CloudFront
        run: |
          # First pass: upload every file with long immutable cache. Safe for
          # Gatsby's content-hashed assets under /static/ and for the big
          # stuff (GeoJSON, posters, JS chunks) that never change in-place.
          aws s3 sync public/ s3://${{ secrets.FRONTEND_S3_BUCKET }} --delete \
            --cache-control "public, max-age=31536000, immutable"

          # Second pass: force-replace metadata on files whose URL is stable
          # but content changes per deploy (HTML routing targets, sw.js,
          # page-data, manifest). Uses `aws s3 cp --recursive` because
          # `aws s3 sync --metadata-directive` is silently ignored by the
          # CLI (documented gotcha) and the first pass's long-cache header
          # would otherwise stick. --metadata-directive REPLACE on cp forces
          # the header rewrite.
          aws s3 cp public/ s3://${{ secrets.FRONTEND_S3_BUCKET }}/ \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "sw.js" \
            --include "*.webmanifest" \
            --include "page-data/*.json" \
            --include "page-data/**/*.json" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=0, must-revalidate"

          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
